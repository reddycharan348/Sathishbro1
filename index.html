<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="description" content="Tectonix is an AI-powered learning assistant for engineering students. Access curated roadmaps, courses, and career guidance for CSE, ECE, Mechanical, Civil, and more." />
    <meta name="keywords" content="engineering roadmaps, learning platform, career guidance, CSE courses, VLSI learning, IoT roadmap, placement support, Tectonix" />
    <meta name="author" content="Tectonix Team" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://tectonix.com" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tectonix.com/" />
    <meta property="og:title" content="Tectonix | Next-Gen Engineering Learning Platform" />
    <meta property="og:description" content="Bridge the gap between academia and industry with AI-powered roadmaps and expert guidance." />
    <meta property="og:image" content="https://tectonix.com/logo.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://tectonix.com/" />
    <meta property="twitter:title" content="Tectonix | Next-Gen Engineering Learning Platform" />
    <meta property="twitter:description" content="Bridge the gap between academia and industry with AI-powered roadmaps and expert guidance." />
    <meta property="twitter:image" content="https://tectonix.com/logo.png" />

    <title>Tectonix | Professional Engineering Learning Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      html, body { height: 100%; margin: 0; background: #ffffff; color: #1e293b; font-family: 'Inter', sans-serif; } 
      #root { height: 100%; }
      .initial-loader { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #ffffff; z-index: 9999; transition: opacity 0.5s ease; }
      .spinner { width: 40px; height: 40px; border: 4px solid rgba(0,0,0,0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader" id="page-loader"><div class="spinner"></div></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', () => {
        const l = document.getElementById('page-loader');
        if (l) { l.style.opacity = '0'; setTimeout(() => l.remove(), 500); }
      });
    </script>
  </body>
</html>
